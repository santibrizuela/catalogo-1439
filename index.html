<title>1439 Group — Catálogo Mayorista</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#0d0d0d;--surface2:#161616;--border:#1e1e1e;
  --text:#fff;--muted:#888;--gold:#fffbf1;--gold-l:#eadbb4;
  --r:12px;--r-sm:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5;min-height:100vh}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.h-inner{max-width:1400px;margin:0 auto;padding:.875rem 1.5rem;display:flex;align-items:center;gap:1rem}
.logo-img{height:44px;width:auto;object-fit:contain}
.h-div{width:1px;height:28px;background:var(--border)}
.h-title{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:500}

/* TABS */
.tabs-bar{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:65px;z-index:90}
.tabs-inner{max-width:1400px;margin:0 auto;padding:0 1.5rem;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs-inner::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;color:var(--muted);font-size:.8125rem;font-weight:500;letter-spacing:.05em;padding:.875rem 1.25rem;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold-l);border-bottom-color:var(--gold-l)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:2rem 1.5rem 5rem}
.sec-label{font-size:.6875rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
.sec-count{font-size:.875rem;color:var(--muted);margin-bottom:1.5rem}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);border-color:#333;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.card-thumb{position:relative;aspect-ratio:1;overflow:hidden;background:var(--surface2)}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-thumb img{transform:scale(1.04)}
.card-badge{position:absolute;top:.625rem;left:.625rem;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);border-radius:var(--r-sm);padding:.25rem .5rem;font-size:.625rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-l);border:1px solid rgba(212,168,67,.3)}
.card-body{padding:1rem 1.125rem 1.25rem}
.card-name{font-size:.875rem;font-weight:600;line-height:1.3;margin-bottom:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-from{font-size:.625rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.card-price{font-size:1.25rem;font-weight:700;color:var(--gold-l);margin-top:.125rem}
.card-foot{margin-top:.875rem;padding-top:.875rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-stock{display:flex;align-items:center;gap:.375rem;font-size:.625rem;color:#4ade80}
.card-stock::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.card-cta{font-size:.6875rem;color:var(--muted);font-weight:500}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;position:relative;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.modal-top{position:sticky;top:0;z-index:10;display:flex;justify-content:flex-end;padding:1rem 1rem 0;background:linear-gradient(var(--surface),transparent)}
.close-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.125rem;transition:background .2s}
.close-btn:hover{background:#222}
.modal-body{padding:0 1.5rem 2rem}
.m-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
@media(max-width:640px){.m-layout{grid-template-columns:1fr}}

/* Gallery */
.g-main{aspect-ratio:1;background:var(--surface2);border-radius:var(--r);overflow:hidden;margin-bottom:.625rem}
.g-main img{width:100%;height:100%;object-fit:cover;transition:opacity .2s}
.g-thumbs{display:flex;gap:.5rem;flex-wrap:wrap}
.g-thumb{width:58px;height:58px;border-radius:var(--r-sm);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;background:var(--surface2);flex-shrink:0}
.g-thumb.active{border-color:var(--gold-l)}
.g-thumb img{width:100%;height:100%;object-fit:cover}

/* Modal content */
.m-name{font-size:1.375rem;font-weight:700;line-height:1.25;margin-bottom:1rem}
.m-desc{font-size:.875rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6}
.feat-list{list-style:none;margin-bottom:1.5rem}
.feat-list li{font-size:.8125rem;padding:.3rem 0;display:flex;align-items:flex-start;gap:.5rem;color:#ccc;border-bottom:1px solid var(--border)}
.feat-list li:last-child{border-bottom:none}
.feat-list li::before{content:'✓';color:var(--gold-l);font-weight:700;flex-shrink:0;margin-top:1px}
.m-extra{font-size:.8125rem;color:var(--muted);margin-bottom:1.25rem}

/* Price table */
.pt-title{font-size:.6875rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.625rem}
.pt{width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:.875rem}
.pt th{text-align:left;padding:.5rem .75rem;background:var(--surface2);color:var(--muted);font-size:.75rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.pt th:first-child{border-radius:6px 0 0 6px}
.pt th:last-child{border-radius:0 6px 6px 0;text-align:right}
.pt td{padding:.625rem .75rem;border-bottom:1px solid var(--border);color:#ddd}
.pt td:last-child{text-align:right;font-weight:600;color:var(--gold-l)}
.pt tr:last-child td{border-bottom:none}
.pt tr.best td{background:rgba(212,168,67,.05)}
.best-tag{background:var(--gold);color:#000;font-size:.5625rem;font-weight:700;padding:.125rem .375rem;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;margin-left:.375rem;vertical-align:middle}
.m-note{font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:1.25rem}

/* WA button */
.wa-btn{display:flex;align-items:center;justify-content:center;gap:.625rem;width:100%;padding:.875rem;background:#25d366;color:#fff;font-weight:700;font-size:.9375rem;border-radius:var(--r);text-decoration:none;transition:background .2s,transform .1s}
.wa-btn:hover{background:#20b858;transform:translateY(-1px)}
.wa-btn:active{transform:translateY(0)}

/* Fragrance grid */
.frag-section-title{font-size:.6875rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:1.25rem 0 .625rem}
.frag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:.5rem;margin-bottom:1rem}
.frag-item{cursor:pointer;text-align:center}
.frag-item img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:var(--r-sm);border:2px solid var(--border);transition:border-color .2s}
.frag-item:hover img,.frag-item.active img{border-color:var(--gold-l)}
.frag-name{font-size:.5625rem;color:var(--muted);margin-top:.25rem;line-height:1.2}

/* FAB */
.wa-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.35);z-index:200;transition:transform .2s,box-shadow .2s;text-decoration:none}
.wa-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,.45)}

/* Responsive */
@media(max-width:480px){
  .grid{grid-template-columns:1fr 1fr;gap:.75rem}
  main{padding:1.25rem 1rem 5rem}
  .card-name{font-size:.8125rem}
  .card-price{font-size:1.125rem}
  .modal-body{padding:0 1rem 2rem}
}
@media(max-width:360px){.grid{grid-template-columns:1fr}}
</style>

function enc(path){
  return path.split('/').map(s=>encodeURIComponent(s)).join('/');
}

let activeCat='all';

function renderGrid(cat){
  activeCat=cat;
  const list=cat==='all'?P:P.filter(p=>p.cat===cat);
  document.getElementById('countLabel').textContent=list.length+' producto'+(list.length!==1?'s':'');
  document.getElementById('grid').innerHTML=list.map(p=>`
    <article class="card" onclick="openModal('${p.id}')">
      <div class="card-thumb">
        <img src="${enc(p.imgs[0])}" alt="${p.name}" loading="lazy">
        <span class="card-badge">${p.badge}</span>
      </div>
      <div class="card-body">
        <h2 class="card-name">${p.name}</h2>
        <p class="card-from">Desde</p>
        <p class="card-price">${p.prices[0].p} c/u</p>
        <div class="card-foot">
          <span class="card-stock">Stock inmediato</span>
          <span class="card-cta">Ver más →</span>
        </div>
      </div>
    </article>
  `).join('');
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.cat);
  });
});

let modalProduct=null;

function openModal(id){
  const p=P.find(x=>x.id===id);
  if(!p)return;
  modalProduct=p;

  const thumbsHtml=p.imgs.length>1
    ?'<div class="g-thumbs">'+p.imgs.map((img,i)=>`
        <div class="g-thumb${i===0?' active':''}" onclick="setImg(${i})" id="gth${i}">
          <img src="${enc(img)}" alt="img${i}" loading="lazy">
        </div>`).join('')+'</div>'
    :'';

  const fragsHtml=p.frags
    ?`<p class="frag-section-title">11 Fragancias disponibles</p>
       <div class="frag-grid">`+p.frags.map((f,i)=>`
         <div class="frag-item" id="fr${i}" onclick="setFrag(${i})">
           <img src="${enc(f.i)}" alt="${f.n}" loading="lazy">
           <p class="frag-name">${f.n}</p>
         </div>`).join('')+'</div>'
    :'';

  const featHtml=p.feat
    ?'<ul class="feat-list">'+p.feat.map(f=>`<li>${f}</li>`).join('')+'</ul>'
    :'';

  const extraHtml=p.extra
    ?`<p class="m-extra">📐 ${p.extra}</p>`:'';

  const priceRows=p.prices.map(pr=>`
    <tr${pr.best?' class="best"':''}>
      <td>${pr.q}${pr.best?'<span class="best-tag">Mejor precio</span>':''}</td>
      <td>${pr.p} c/u</td>
    </tr>`).join('');

  const waMsg=encodeURIComponent('Hola! Me interesa: '+p.name+'. ¿Podés darme más información?');

  document.getElementById('modalBody').innerHTML=`
    <div class="m-layout">
      <div>
        <div class="g-main"><img src="${enc(p.imgs[0])}" alt="${p.name}" id="gMainImg"></div>
        ${thumbsHtml}
        ${fragsHtml}
      </div>
      <div>
        <h2 class="m-name">${p.name}</h2>
        <p class="m-desc">${p.desc}</p>
        ${featHtml}
        ${extraHtml}
        <p class="pt-title">Precios por cantidad</p>
        <table class="pt">
          <thead><tr><th>Cantidad</th><th>Precio unitario</th></tr></thead>
          <tbody>${priceRows}</tbody>
        </table>
        <p class="m-note">✈️ Envíos a todo el país &nbsp;·&nbsp; Mientras más llevás, mejor precio</p>
        <a href="https://wa.me/${WA}?text=${waMsg}" class="wa-btn" target="_blank" rel="noopener">

          Consultar por WhatsApp
        </a>
      </div>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('waFab').href=`https://wa.me/${WA}?text=${waMsg}`;
}

function setImg(i){
  if(!modalProduct)return;
  document.getElementById('gMainImg').src=enc(modalProduct.imgs[i]);
  document.querySelectorAll('.g-thumb').forEach((t,j)=>t.classList.toggle('active',j===i));
}

function setFrag(i){
  if(!modalProduct||!modalProduct.frags)return;
  document.getElementById('gMainImg').src=enc(modalProduct.frags[i].i);
  document.querySelectorAll('.frag-item').forEach((f,j)=>f.classList.toggle('active',j===i));
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('waFab').href=`https://wa.me/${WA}`;
  modalProduct=null;
}

document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget)closeModal();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

renderGrid('all');
document.getElementById('waFab').href=`https://wa.me/${WA}`;
</script>
